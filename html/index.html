  ];

  // Function to dynamically update the list, could and probaly should be moved into script.js
  // For testing purposes this is fine to remain here.
  function updateList() {
    const itemContainer = document.getElementById('item-container');
    itemContainer.innerHTML = '';

    guides.forEach(guide => { // Ensure you're using 'guides' here
      const listItem = document.createElement('li');
      const link = document.createElement('a');
      link.href = `guide${guide.id}.html`;
      link.textContent = guide.title;

      listItem.appendChild(link);
      itemContainer.appendChild(listItem);
    });
  }

  // Call the function when the page loads
  window.onload = updateList();
</script>
